<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>MultiManager</title>
<link rel="stylesheet" href="/styles.css"></head><body>

<div id="sb">
  <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>MultiManager</div>
  <div style="padding:0 8px;flex:1;display:flex;flex-direction:column;gap:2px">
    <div class="ni on" data-p="acc" onclick="go('acc')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span data-l="accounts">Accounts</span></div>
    <div class="ni" data-p="skills" onclick="go('skills')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg><span data-l="skills">Skills</span></div>
    <div class="ni" data-p="mcp" onclick="go('mcp')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M1 12h4m14 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83"/></svg><span data-l="mcp">MCP</span></div>
    <div class="sep"></div>
    <div class="ni" data-p="progs" onclick="go('progs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg><span data-l="programs">Programs</span></div>
    <div class="ni" data-p="set" onclick="go('set')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span data-l="settings">Settings</span></div>
  </div>
  <div style="padding:4px 12px 2px;display:flex;align-items:center;gap:6px;border-top:1px solid var(--brd);margin:0 8px">
    <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);box-shadow:0 0 4px var(--ok)"></span>
    <span data-l="running" style="font-size:11px;color:var(--tx3)">Running</span>
    <select id="lang-sw" style="margin-left:auto;padding:2px 4px;font-size:10px;background:var(--card);border:1px solid var(--brd2);border-radius:4px;color:var(--tx3);outline:none" onchange="setLang(this.value)">
      <option value="ru">RU</option><option value="en">EN</option>
    </select>
  </div>
</div>

<div id="main">
<!-- ACCOUNTS -->
<div id="pg-acc" class="pg on">
  <div id="acc-list">
    <div class="lh"><h3 data-l="accounts">Accounts</h3><div style="display:flex;gap:4px"><div style="position:relative;display:inline-block" id="import-dd"><button class="b bs" onclick="toggleImportDD()" data-l="import">Import</button><div id="import-menu" style="display:none;position:absolute;right:0;top:100%;margin-top:2px;background:var(--card);border:1px solid var(--brd2);border-radius:var(--r);z-index:50;min-width:140px;overflow:hidden"><div style="padding:6px 12px;cursor:pointer;font-size:12px;white-space:nowrap" onclick="doImport();hideImportDD()" data-l="auto_import">Auto Import</div><div style="padding:6px 12px;cursor:pointer;font-size:12px;white-space:nowrap;border-top:1px solid var(--brd)" onclick="doImportFile();hideImportDD()" data-l="from_file">From File...</div></div></div><button class="b bs" onclick="refreshUsage()">Usage</button><button class="b bs bp" onclick="openModal('m-create')">+</button></div></div>
    <div id="acc-cards"></div>
  </div>
  <div id="ppanel" style="gap:0">
    <div class="empty" id="no-sel"><p data-l="select_account">Select an account</p></div>
    <div id="pcon" style="display:none;flex:1;overflow-y:auto;padding:12px 16px">
      <div id="adets" style="margin-bottom:8px;padding:12px;border-radius:var(--rl);border:1px solid var(--brd);background:var(--card)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
            <span class="dot" id="ad-dot" style="width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>
            <span id="ad-name" style="font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="b bs" id="btn-rename" onclick="renameAcc()">✏ <span data-l="rename">Rename</span></button>
            <button class="b bs bd" onclick="deleteAcc()">✕ <span data-l="delete">Delete</span></button>
          </div>
        </div>
        <div id="ad-body"></div>
      </div>
      <div class="pgrid" id="pgrid"></div>
    </div>
  </div>
</div>

<!-- SKILLS -->
<div id="pg-skills" class="pg">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px 12px;flex-wrap:wrap;gap:6px">
    <div class="pt" style="padding:0" data-l="skills">Skills</div>
    <div style="display:flex;gap:6px;align-items:center">
      <select id="sk-import-prog" style="padding:4px 8px;background:var(--card);border:1px solid var(--brd2);border-radius:var(--r);color:var(--tx);font-size:11px;outline:none"></select>
      <button class="b bs" onclick="importSkillsFromProgram()" data-l="import">Import</button>
      <button class="b bs" onclick="importSkillsFromFolder()" data-l="from_folder">From Folder</button>
      <button class="b bs bp" onclick="syncAllSkills()" data-l="sync_all">Sync All</button>
      <button class="b bs" onclick="loadSkills()" data-l="refresh">Refresh</button>
    </div>
  </div>
  <div style="flex:1;overflow:auto;padding:0 24px 20px"><table class="tmat" id="sk-tbl"><thead id="sk-head"></thead><tbody id="sk-body"></tbody></table></div>
</div>

<!-- MCP -->
<div id="pg-mcp" class="pg">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:20px 24px 12px">
    <div class="pt" style="padding:0" data-l="mcp">MCP Servers</div>
    <div style="display:flex;gap:6px"><button class="b bs bp" onclick="syncAllMcp()" data-l="sync_all">Sync All</button><button class="b bs bp" onclick="openModal('m-mcp')">+ <span data-l="add">Add</span></button></div>
  </div>
  <div style="flex:1;overflow:auto;padding:0 24px 20px"><table class="tmat" id="mcp-tbl"><thead id="mcp-head"></thead><tbody id="mcp-body"></tbody></table></div>
</div>

<!-- PROGRAMS -->
<div id="pg-progs" class="pg" style="padding:20px 24px;flex-direction:column">
  <div class="pt" style="padding:0 0 16px" data-l="programs">Programs</div>
  <div id="prog-cards" class="pgrid"></div>
  <div id="prog-detail" style="display:none"></div>
</div>

<!-- SETTINGS -->
<div id="pg-set" class="pg" style="padding:20px 24px">
  <div class="pt" style="padding:0 0 16px" data-l="settings">Settings</div>
  <div id="set-con"></div>
</div>
</div>

<!-- MODALS -->
<div class="mo" id="m-create"><div class="md">
  <h2 data-l="new_account">New Account</h2>
  <div class="fg"><label data-l="name">Name</label><input id="f-name" placeholder="e.g. Z.AI GLM"></div>
  <div class="fg"><label>Provider</label><select id="f-prov"><option value="anthropic">Anthropic</option><option value="openai">OpenAI</option><option value="openrouter">OpenRouter</option><option value="gemini">Gemini</option><option value="deepseek">DeepSeek</option><option value="mistral">Mistral</option><option value="ollama">Ollama</option><option value="groq">Groq</option><option value="xai">xAI</option></select></div>
  <div class="fg"><label>API Key</label><input id="f-key" type="password" placeholder="sk-..."></div>
  <div class="fg"><label data-l="base_url">Base URL</label><input id="f-url" placeholder="https://api.z.ai/api/anthropic"></div>
  <div class="fg"><label data-l="model">Model</label><input id="f-model" placeholder="glm-5.1"></div>
  <div class="fa"><button class="b" onclick="closeModal('m-create')" data-l="cancel">Cancel</button><button class="b bp" onclick="createAcc()" data-l="create">Create</button></div>
</div></div>

<div class="mo" id="m-mcp"><div class="md">
  <h2 data-l="add_mcp_server">Add MCP Server</h2>
  <div class="fg"><label data-l="name">Name</label><input id="mf-name" placeholder="my-server"></div>
  <div class="fg"><label>Command</label><input id="mf-cmd" placeholder="npx"></div>
  <div class="fg"><label data-l="args_comma">Args (comma)</label><input id="mf-args" placeholder="mcp-server,--flag"></div>
  <div class="fg"><label>URL (SSE)</label><input id="mf-url" placeholder="https://..."></div>
  <div class="fa"><button class="b" onclick="closeModal('m-mcp')" data-l="cancel">Cancel</button><button class="b bp" onclick="addMcp()" data-l="add">Add</button></div>
</div></div>

<div id="tc"></div>

<script src="/app.js?v=1"></script></body></html>
